    <linearGradient id="line" x1="0" x2="1">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset=".55" stop-color="#4fd6c7"/>
      <stop offset="1" stop-color="#f5c85b"/>
    </linearGradient>
  </defs>
  <rect width="900" height="560" rx="28" fill="url(#bg)"/>
  <g stroke="#f4f1e8" opacity=".1">
    <path d="M0 120h900M0 240h900M0 360h900M0 480h900"/>
    <path d="M140 0v560M280 0v560M420 0v560M560 0v560M700 0v560"/>
  </g>
  <g fill="none" stroke="url(#line)" stroke-width="3" opacity=".75">
    <path d="M180 314 312 202 456 286 612 150 736 240"/>
    <path d="M218 408 312 202 540 402 736 240"/>
    <path d="M180 314 456 286 540 402"/>
    <path d="M612 150 540 402"/>
  </g>
  <g>
    <circle cx="180" cy="314" r="34" fill="#191a20" stroke="#4fd6c7" stroke-width="4"/>
    <circle cx="312" cy="202" r="42" fill="#191a20" stroke="#a78bfa" stroke-width="4"/>
    <circle cx="456" cy="286" r="50" fill="#191a20" stroke="#f5c85b" stroke-width="4"/>
    <circle cx="612" cy="150" r="34" fill="#191a20" stroke="#9dd85d" stroke-width="4"/>
    <circle cx="736" cy="240" r="42" fill="#191a20" stroke="#ff7b6e" stroke-width="4"/>
    <circle cx="540" cy="402" r="38" fill="#191a20" stroke="#4fd6c7" stroke-width="4"/>
  </g>
  <g transform="translate(336 226)">
