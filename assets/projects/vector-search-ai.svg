<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" role="img" aria-labelledby="title desc">
  <title id="title">Vector search AI system</title>
  <desc id="desc">A dark illustration of vector nodes, embeddings and a database search system.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="75%">
      <stop offset="0" stop-color="#202033"/>
      <stop offset="1" stop-color="#101114"/>
