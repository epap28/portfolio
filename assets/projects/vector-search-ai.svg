    <text x="30" y="46" fill="#f4f1e8" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">Vector Search</text>
    <text x="30" y="78" fill="#b7b2a5" font-family="Inter, Arial, sans-serif" font-size="16">Embeddings + retrieval</text>
  </g>
  <g transform="translate(112 96)" fill="#f4f1e8" opacity=".72" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">
